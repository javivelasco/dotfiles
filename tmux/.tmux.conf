# Prefix
set -g prefix C-s
bind-key C-s send-prefix

# Terminal capabilities: truecolor, clipboard, hyperlinks, undercurl
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB,*:clipboard,*:hyperlinks,*:usstyle'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'  # cursor shape support

# Undercurl support (for neovim diagnostics)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Extended keys (CSI-u) so Shift+Enter, Ctrl+Shift+<key>, etc. reach TUIs
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# Send the prefix through to the underlying app with C-s a
bind-key a send-prefix

# C-s C-a jumps to the last window
bind-key C-a last-window

# Reload config
bind r source-file ~/.tmux.conf \; display 'Reloaded tmux config.'

# Mouse
set -g mouse on

# Resize only if actively looking
setw -g aggressive-resize on

# Move windows left and right
bind-key -n C-S-Left swap-window -t -1 -d
bind-key -n C-S-Right swap-window -t +1 -d

bind C-l send-keys 'C-l'

# Increase history limit
set -g history-limit 100000

# use vim-like keys for splits and windows
unbind %
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Use the vim resize keys.
bind - resize-pane -D 1
bind + resize-pane -U 1
bind < resize-pane -L 1
bind > resize-pane -R 1

# Reassign switch sessions
bind t choose-session

# Set vi keys for copy/paste and visual mode
setw -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
# Copy: pipe to pbcopy on macOS; elsewhere rely on set-clipboard (OSC 52),
# which propagates to the local clipboard even over SSH
if -b 'command -v pbcopy' {
  bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'
} {
  bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
}

# Enable mouse wheel
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M

# Don't allow rename panes
set-option -g allow-rename off

# Quiet: no bells, no activity popups
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none
set-option -sg escape-time 10

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g focus-events on
set -g set-clipboard on

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'o0th/tmux-nova'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'GROG/tmux-plugin-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'

# Plugin configs
# set -g @continuum-restore 'on'
# set -g @continuum-save-interval '15'
set -g @thumbs-command 'echo -n {} | pbcopy'

# Theme: tmux-nova with gruvbox (dark) palette, slanted separators (as on the nova site)
set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left ""
set -g @nova-nerdfonts-right ""
set -g @nova-padding 1

set -g @nova-status-style-bg "#3c3836"
set -g @nova-status-style-fg "#a89984"
set -g @nova-status-style-active-bg "#fabd2f"
set -g @nova-status-style-active-fg "#282828"
set -g @nova-status-activity-fg "#fe8019"

# Prompt/message/copy-mode colors
set -g @nova-message-style-bg "#3c3836"
set -g @nova-message-style-fg "#ebdbb2"
set -g @nova-message-command-style-bg "#3c3836"
set -g @nova-message-command-style-fg "#ebdbb2"
set -g @nova-mode-style-bg "#504945"
set -g @nova-mode-style-fg "#ebdbb2"

set -g @nova-pane-border-style "#3c3836"
set -g @nova-pane-active-border-style "#a89984"

# Window entries: index + name (+ zoom flag)
set -g @nova-pane "#I #W#{?window_zoomed_flag, Z,}"

# Left: Vercel triangle
set -g @nova-segment-mode "▲"
set -g @nova-segment-mode-colors "#a89984 #282828"

# Right: nova's default whoami segment, gruvbox colors
set -g @nova-segment-whoami-colors "#504945 #ebdbb2"

set -g @nova-rows 0
set -g @nova-segments-0-left "mode"
set -g @nova-segments-0-right "whoami"

# Auto-install tpm on a fresh machine
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run -b '~/.tmux/plugins/tpm/tpm'
